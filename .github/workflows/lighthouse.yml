name: Lighthouse CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Nightly mobile budget run
    - cron: "17 3 * * *"
    # Monthly baseline refresh (1st of month at 04:00 UTC)
    - cron: "0 4 1 * *"
  workflow_dispatch:
    inputs:
      refresh_baseline:
        description: "Force-refresh the perf baseline"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      IS_BASELINE_RUN: ${{ github.event.schedule == '0 4 1 * *' || github.event.inputs.refresh_baseline == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'bun.lock', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Restore Lighthouse history
        uses: actions/cache@v4
        with:
          path: .lhci-history
          key: lhci-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            lhci-history-${{ github.ref_name }}-
            lhci-history-main-

      - name: Restore Lighthouse baseline
        if: env.IS_BASELINE_RUN != 'true'
        uses: actions/cache@v4
        with:
          path: .lhci-baseline
          key: lhci-baseline-v1

      - name: Run Lighthouse CI (mobile + perf budgets)
        id: lhci
        run: |
          set +e
          lhci autorun --config=./lighthouserc.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Update history + baseline
        if: always()
        run: node scripts/lhci-history.mjs
        env:
          IS_BASELINE_RUN: ${{ env.IS_BASELINE_RUN }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
          GIT_RUN_ID: ${{ github.run_id }}
          GIT_REPO: ${{ github.repository }}

      - name: Render trend chart
        if: always()
        run: node scripts/lhci-trend.mjs

      - name: Build PR comment from assertion results
        if: always()
        run: node scripts/lhci-comment.mjs

      - name: Emit GitHub annotations for failing audits
        if: always()
        run: node scripts/lhci-annotate.mjs

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: |
            .lighthouseci
            .lhci-history
            lhci-comment.md
            .lhci-history/trend.svg
          if-no-files-found: ignore
          retention-days: 30

      - name: Sticky PR comment with budget failures
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse-ci
          path: lhci-comment.md

      - name: Share preview meta check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/check-share-preview.mjs
        continue-on-error: true

      - name: Re-assert Lighthouse budgets
        if: always()
        run: |
          code="${{ steps.lhci.outputs.exit_code }}"
          if [ "$code" != "0" ]; then
            echo "Lighthouse CI failed with exit code $code"
            exit "$code"
          fi